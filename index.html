<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#E30613">
<meta name="description" content="App Sindical UGT Plataforma Europa">
<title>UGT Plataforma Europa</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
/* ── RESET & BASE ────────────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:"Inter",system-ui,sans-serif;background:#F0F2F5;color:#111827}
a{text-decoration:none;color:inherit}
button{font-family:inherit;cursor:pointer;border:none;background:none}
input,textarea,select{font-family:inherit;font-size:inherit}
img{max-width:100%;display:block}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#D1D5DB;border-radius:3px}

/* ── LAYOUT ──────────────────────────────────────────────── */
#app{height:100vh;display:flex;flex-direction:column}
.shell{display:flex;flex:1;overflow:hidden}
.sidebar{
  width:252px;background:#fff;border-right:1px solid #E5E7EB;
  display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto
}
.main-area{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.topbar{
  background:#fff;border-bottom:1px solid #E5E7EB;
  padding:0 28px;height:60px;display:flex;align-items:center;
  justify-content:space-between;flex-shrink:0;gap:16px
}
.page-content{flex:1;overflow-y:auto;padding:28px}
.page-content.flush{padding:0;overflow:hidden;display:flex;flex-direction:column}

/* ── SIDEBAR ─────────────────────────────────────────────── */
.sb-header{
  padding:16px 14px;border-bottom:1px solid #E5E7EB;
  display:flex;align-items:center;gap:10px;flex-shrink:0
}
.sb-logo{
  width:52px;height:52px;border-radius:50%;flex-shrink:0;
  object-fit:cover;border:2px solid #E5E7EB;background:#F9FAFB
}
.sb-name{font-size:13px;font-weight:700;line-height:1.3;color:#111827}
.sb-sub{font-size:11px;color:#6B7280;margin-top:1px}
.sb-nav{padding:12px 8px;flex:1}
.nav-label{
  font-size:10px;font-weight:700;color:#9CA3AF;
  text-transform:uppercase;letter-spacing:.8px;
  padding:10px 8px 4px
}
.nav-item{
  display:flex;align-items:center;gap:10px;
  padding:8px 10px;border-radius:10px;
  font-size:13px;font-weight:500;color:#4B5563;
  width:100%;text-align:left;transition:all .12s;margin-bottom:1px
}
.nav-item:hover{background:#F3F4F6;color:#111827}
.nav-item.active{background:var(--brand-bg);color:var(--brand);font-weight:700}
.nav-item svg{flex-shrink:0;width:17px;height:17px}
.sb-footer{padding:10px 8px;border-top:1px solid #E5E7EB;flex-shrink:0}

/* ── TOPBAR ──────────────────────────────────────────────── */
.topbar-title{font-size:18px;font-weight:800;color:#111827;white-space:nowrap}
.topbar-right{display:flex;align-items:center;gap:10px;flex-shrink:0}

/* ── CARDS ───────────────────────────────────────────────── */
.card{background:#fff;border:1px solid #E5E7EB;border-radius:16px;padding:22px}
.card-sm{padding:16px}
.grid2{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px}
.grid3{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:12px}

/* ── BUTTONS ─────────────────────────────────────────────── */
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:7px;
  padding:9px 18px;border-radius:10px;font-size:13px;font-weight:600;
  cursor:pointer;transition:opacity .12s,transform .1s;white-space:nowrap;border:none
}
.btn:hover{opacity:.88}
.btn:active{transform:scale(.97)}
.btn:disabled{opacity:.4;cursor:not-allowed;pointer-events:none}
.btn svg{width:15px;height:15px;flex-shrink:0}
.btn-primary{background:var(--brand);color:#fff}
.btn-secondary{background:#F3F4F6;color:#374151;border:1px solid #E5E7EB}
.btn-danger{background:#FEF2F2;color:#DC2626;border:1px solid #FECACA}
.btn-success{background:#F0FDF4;color:#16A34A;border:1px solid #BBF7D0}
.btn-sm{padding:6px 13px;font-size:12px}
.btn-lg{padding:13px 28px;font-size:15px;width:100%}
.btn-icon{padding:7px;border-radius:8px;width:34px;height:34px}

/* ── FORMS ───────────────────────────────────────────────── */
.form-group{margin-bottom:16px}
.form-group:last-child{margin-bottom:0}
.label{display:block;font-size:11px;font-weight:700;color:#6B7280;
  text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px}
.input{
  width:100%;padding:9px 12px;
  border:1.5px solid #E5E7EB;border-radius:10px;
  font-size:13px;color:#111827;background:#fff;outline:none;
  transition:border-color .15s
}
.input:focus{border-color:var(--brand)}
.input.error{border-color:#DC2626;background:#FFF5F5}
textarea.input{resize:vertical;min-height:80px;line-height:1.55}
select.input{cursor:pointer}
.input-hint{font-size:11px;color:#9CA3AF;margin-top:4px}
.grid2-form{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.grid3-form{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.checkbox-row{
  display:flex;align-items:center;gap:9px;
  padding:9px 12px;border-radius:10px;background:#F9FAFB;
  cursor:pointer;font-size:13px;font-weight:600;color:#374151;
  border:1.5px solid #E5E7EB
}
.checkbox-row input[type=checkbox]{width:16px;height:16px;accent-color:var(--brand);cursor:pointer;flex-shrink:0}
.form-section{background:#fff;border:1px solid #E5E7EB;border-radius:14px;padding:20px;margin-bottom:16px}
.form-section-title{font-size:14px;font-weight:700;color:#111827;margin-bottom:14px;
  display:flex;align-items:center;gap:8px}

/* ── ALERTS ──────────────────────────────────────────────── */
.alert{padding:12px 16px;border-radius:12px;font-size:13px;line-height:1.5;
  display:flex;align-items:flex-start;gap:10px;margin-bottom:16px}
.alert svg{width:16px;height:16px;flex-shrink:0;margin-top:1px}
.alert-warn{background:#FFF7ED;color:#92400E;border:1px solid #FED7AA}
.alert-info{background:#EFF6FF;color:#1D4ED8;border:1px solid #BFDBFE}
.alert-success{background:#F0FDF4;color:#15803D;border:1px solid #86EFAC}
.alert-error{background:#FEF2F2;color:#DC2626;border:1px solid #FECACA}

/* ── BADGE ───────────────────────────────────────────────── */
.badge{
  display:inline-flex;align-items:center;gap:4px;
  padding:2px 9px;border-radius:20px;font-size:11px;font-weight:700
}

/* ── MODAL ───────────────────────────────────────────────── */
.modal-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:500;
  display:flex;align-items:center;justify-content:center;padding:20px;
  opacity:0;pointer-events:none;transition:opacity .2s
}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal{
  background:#fff;border-radius:20px;max-width:700px;width:100%;
  max-height:90vh;display:flex;flex-direction:column;overflow:hidden;
  box-shadow:0 24px 60px rgba(0,0,0,.2);transform:translateY(12px);transition:transform .2s
}
.modal-overlay.open .modal{transform:translateY(0)}
.modal-header{
  padding:16px 22px;border-bottom:1px solid #E5E7EB;
  display:flex;align-items:center;justify-content:space-between;flex-shrink:0
}
.modal-title{font-size:16px;font-weight:800;color:#111827}
.modal-body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.modal-foot{padding:16px 22px;border-top:1px solid #E5E7EB;display:flex;justify-content:flex-end;gap:10px;flex-shrink:0}
.modal-img{width:100%;height:260px;object-fit:cover;display:block;flex-shrink:0}
.modal-close{
  width:32px;height:32px;border-radius:50%;background:#F3F4F6;border:none;
  cursor:pointer;display:flex;align-items:center;justify-content:center
}
.modal-close svg{width:16px;height:16px;color:#6B7280}

/* ── NEWS ────────────────────────────────────────────────── */
.news-card{
  background:#fff;border:1px solid #E5E7EB;border-radius:16px;overflow:hidden;
  cursor:pointer;transition:transform .15s,box-shadow .15s
}
.news-card:hover{transform:translateY(-3px);box-shadow:0 10px 30px rgba(0,0,0,.1)}
.news-img{width:100%;height:190px;object-fit:cover;display:block}
.news-body{padding:18px}
.news-meta{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.news-title{font-size:15px;font-weight:700;line-height:1.4;margin-bottom:6px;color:#111827}
.news-excerpt{font-size:13px;color:#6B7280;line-height:1.55}
.news-link{font-size:13px;font-weight:700;margin-top:10px;display:inline-block}

/* ── DOCUMENTS ───────────────────────────────────────────── */
.doc-group{background:#fff;border:1px solid #E5E7EB;border-radius:14px;overflow:hidden;margin-bottom:10px}
.doc-group-header{
  display:flex;align-items:center;gap:12px;padding:16px 18px;
  cursor:pointer;transition:background .12s;border:none;background:transparent;width:100%;text-align:left
}
.doc-group-header:hover{background:#F9FAFB}
.doc-group-icon{width:42px;height:42px;border-radius:11px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.doc-group-icon svg{width:20px;height:20px}
.doc-group-info{flex:1;min-width:0}
.doc-group-name{font-size:14px;font-weight:700;color:#111827}
.doc-group-count{font-size:12px;color:#9CA3AF;margin-top:1px}
.doc-group-chevron{color:#D1D5DB;flex-shrink:0;transition:transform .2s}
.doc-group-chevron svg{width:18px;height:18px}
.doc-group-body{border-top:1px solid #F3F4F6}
.doc-item{
  display:flex;align-items:center;gap:12px;padding:12px 18px;
  border-bottom:1px solid #F9FAFB;transition:background .12s
}
.doc-item:last-child{border-bottom:none}
.doc-item:hover{background:#F9FAFB}
.doc-item-icon{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.doc-item-icon svg{width:18px;height:18px}
.doc-item-info{flex:1;min-width:0}
.doc-item-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:#111827}
.doc-item-meta{font-size:11px;color:#9CA3AF;margin-top:1px}
.doc-empty{padding:16px 18px;font-size:13px;color:#9CA3AF;font-style:italic}

/* ── HERO BANNER ─────────────────────────────────────────── */
.hero-banner{
  background:linear-gradient(135deg,var(--brand) 0%,var(--brand-dark) 100%);
  border-radius:20px;padding:28px 32px;color:#fff;
  display:flex;align-items:center;gap:24px;margin-bottom:24px
}
.hero-logo{
  width:88px;height:88px;border-radius:50%;object-fit:cover;
  background:#fff;padding:4px;flex-shrink:0;
  box-shadow:0 4px 16px rgba(0,0,0,.2)
}
.hero-title{font-size:26px;font-weight:800;line-height:1.2;margin-bottom:5px}
.hero-sub{font-size:14px;opacity:.85;line-height:1.4}
.hero-pills{display:flex;flex-wrap:wrap;gap:7px;margin-top:12px}
.hero-pill{
  display:inline-flex;align-items:center;gap:5px;
  background:rgba(255,255,255,.18);border-radius:20px;
  padding:4px 11px;font-size:12px
}
.hero-pill svg{width:13px;height:13px;flex-shrink:0}

/* ── QUICK ACCESS ────────────────────────────────────────── */
.quick-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px;margin-bottom:24px}
.quick-btn{
  background:#fff;border:1px solid #E5E7EB;border-radius:14px;
  padding:18px 12px;text-align:center;cursor:pointer;
  display:flex;flex-direction:column;align-items:center;gap:9px;
  transition:transform .15s,box-shadow .15s;width:100%
}
.quick-btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,.08)}
.quick-ico{width:48px;height:48px;border-radius:13px;display:flex;align-items:center;justify-content:center}
.quick-ico svg{width:22px;height:22px;color:#fff}
.quick-label{font-size:12px;font-weight:700;color:#374151;line-height:1.3}

/* ── ENCUESTA ────────────────────────────────────────────── */
.enc-card{border-radius:20px;overflow:hidden;margin-bottom:20px}
.enc-top{padding:28px 32px;color:#fff}
.enc-bottom{padding:16px 32px;background:rgba(0,0,0,.2)}
.prog-bar{height:8px;border-radius:4px;background:rgba(255,255,255,.25);overflow:hidden;margin:8px 0}
.prog-fill{height:100%;border-radius:4px;background:#fff;transition:width .6s}

/* ── CONTACT ─────────────────────────────────────────────── */
.delegate-card{background:#fff;border:1px solid #E5E7EB;border-radius:14px;padding:18px}
.del-avatar{
  width:48px;height:48px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:16px;font-weight:800;flex-shrink:0
}
.del-contact-link{
  display:inline-flex;align-items:center;gap:7px;
  padding:6px 12px;border-radius:8px;background:#F3F4F6;
  font-size:12px;font-weight:600;color:#374151;transition:background .12s
}
.del-contact-link:hover{background:#E5E7EB}
.del-contact-link svg{width:13px;height:13px;flex-shrink:0}

/* ── ADMIN ───────────────────────────────────────────────── */
.admin-shell{display:flex;height:100%;overflow:hidden}
.admin-sb{width:220px;background:#18181B;display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto}
.admin-sb-top{
  padding:18px 14px;border-bottom:1px solid rgba(255,255,255,.1);
  display:flex;align-items:center;gap:10px;flex-shrink:0
}
.admin-logo{width:44px;height:44px;border-radius:50%;object-fit:cover;background:#fff;padding:2px;flex-shrink:0}
.admin-sb-name{font-size:13px;font-weight:700;color:#fff;line-height:1.2}
.admin-sb-sub{font-size:10px;color:rgba(255,255,255,.5)}
.admin-nav{padding:10px 8px;flex:1}
.admin-nav-label{font-size:10px;font-weight:700;color:rgba(255,255,255,.35);
  text-transform:uppercase;letter-spacing:.8px;padding:10px 8px 4px}
.admin-nav-item{
  display:flex;align-items:center;gap:9px;padding:8px 10px;
  border-radius:9px;font-size:13px;font-weight:500;color:rgba(255,255,255,.6);
  width:100%;text-align:left;transition:all .12s;margin-bottom:1px
}
.admin-nav-item:hover{background:rgba(255,255,255,.08);color:#fff}
.admin-nav-item.active{background:var(--brand);color:#fff;font-weight:700}
.admin-nav-item svg{width:16px;height:16px;flex-shrink:0}
.admin-sb-foot{padding:10px 8px;border-top:1px solid rgba(255,255,255,.1);flex-shrink:0}
.admin-main{flex:1;display:flex;flex-direction:column;overflow:hidden;background:#F0F2F5}
.admin-topbar{
  background:#fff;border-bottom:1px solid #E5E7EB;
  padding:0 24px;height:58px;display:flex;align-items:center;
  justify-content:space-between;flex-shrink:0
}
.admin-content{flex:1;overflow-y:auto;padding:24px}
.admin-topbar-title{font-size:16px;font-weight:800;color:#111827}

/* ── ADMIN TABLE ─────────────────────────────────────────── */
.tbl-wrap{background:#fff;border:1px solid #E5E7EB;border-radius:14px;overflow:hidden}
table{width:100%;border-collapse:collapse}
th{text-align:left;padding:10px 16px;font-size:11px;font-weight:700;
  color:#6B7280;text-transform:uppercase;background:#F9FAFB;border-bottom:1px solid #E5E7EB}
td{padding:11px 16px;font-size:13px;border-bottom:1px solid #F3F4F6;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:#FAFAFA}
.tbl-actions{display:flex;gap:6px;justify-content:flex-end}

/* ── ADMIN LOGIN ─────────────────────────────────────────── */
.login-wrap{display:flex;align-items:center;justify-content:center;height:100%;background:#F0F2F5}
.login-card{background:#fff;border-radius:20px;padding:36px;width:360px;
  box-shadow:0 20px 60px rgba(0,0,0,.12);border:1px solid #E5E7EB}
.login-logo{width:80px;height:80px;border-radius:50%;object-fit:cover;
  margin:0 auto 20px;border:3px solid var(--brand);display:block}
.login-title{text-align:center;font-size:20px;font-weight:800;color:#111827;margin-bottom:4px}
.login-sub{text-align:center;font-size:13px;color:#6B7280;margin-bottom:24px}
.pw-wrap{position:relative}
.pw-toggle{position:absolute;right:10px;top:50%;transform:translateY(-50%);
  background:none;border:none;cursor:pointer;color:#9CA3AF;padding:4px;display:flex}
.pw-toggle svg{width:17px;height:17px}

/* ── TOAST ───────────────────────────────────────────────── */
.toast{
  position:fixed;bottom:24px;right:24px;z-index:9999;
  background:#111827;color:#fff;border-radius:12px;
  padding:12px 18px;font-size:13px;font-weight:600;
  display:flex;align-items:center;gap:8px;
  box-shadow:0 8px 24px rgba(0,0,0,.2);
  transform:translateY(80px);transition:transform .25s;pointer-events:none
}
.toast.show{transform:translateY(0)}
.toast-ok{background:#15803D}
.toast-err{background:#DC2626}
.toast svg{width:16px;height:16px;flex-shrink:0}

/* ── SAVED INDICATOR ─────────────────────────────────────── */
.saved-pill{
  background:#F0FDF4;border:1px solid #86EFAC;border-radius:8px;
  padding:6px 12px;font-size:12px;font-weight:700;color:#15803D;
  display:inline-flex;align-items:center;gap:6px
}
.saved-pill svg{width:14px;height:14px}

/* ── COLOR PICKER ROW ────────────────────────────────────── */
.color-row{display:flex;align-items:center;gap:10px}
input[type=color]{
  width:44px;height:36px;border:1.5px solid #E5E7EB;
  border-radius:8px;padding:2px;cursor:pointer;background:#fff
}

/* ── LOGO UPLOAD ─────────────────────────────────────────── */
.logo-upload-area{
  border:2px dashed #E5E7EB;border-radius:14px;padding:20px;
  text-align:center;cursor:pointer;transition:border-color .15s;
  background:#FAFAFA
}
.logo-upload-area:hover{border-color:var(--brand)}
.logo-preview{width:90px;height:90px;border-radius:50%;object-fit:cover;
  margin:0 auto 10px;border:2px solid #E5E7EB;display:block}
#logo-input{display:none}

/* ── SECTION BADGES ──────────────────────────────────────── */
.sec-badge{
  display:inline-flex;align-items:center;gap:4px;
  background:var(--brand-bg);color:var(--brand);
  font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px
}

/* ── UTILS ───────────────────────────────────────────────── */
.flex{display:flex;align-items:center}
.flex-between{display:flex;align-items:center;justify-content:space-between}
.gap8{gap:8px}.gap12{gap:12px}.gap16{gap:16px}
.mb8{margin-bottom:8px}.mb12{margin-bottom:12px}.mb16{margin-bottom:16px}.mb20{margin-bottom:20px}.mb24{margin-bottom:24px}
.mt4{margin-top:4px}.mt8{margin-top:8px}.mt12{margin-top:12px}.mt16{margin-top:16px}
.text-sm{font-size:13px}.text-xs{font-size:11px}.text-muted{color:#6B7280}.text-light{color:#9CA3AF}
.fw7{font-weight:700}.fw8{font-weight:800}
.truncate{overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.full-w{width:100%}
.hidden{display:none}
.sep{border:none;border-top:1px solid #E5E7EB;margin:20px 0}
.tag{display:inline-block;padding:1px 8px;border-radius:20px;font-size:11px;font-weight:700}
.urgente-dot{width:8px;height:8px;border-radius:50%;background:var(--brand);display:inline-block;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
.spin{animation:spin .8s linear infinite;display:inline-block}
@keyframes fadein{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.fadein{animation:fadein .2s ease}

/* ── RESPONSIVE ──────────────────────────────────────────── */
@media(max-width:900px){
  .sidebar{width:200px}
  .quick-grid{grid-template-columns:repeat(auto-fill,minmax(120px,1fr))}
  .hero-banner{flex-direction:column;text-align:center}
  .hero-pills{justify-content:center}
}
@media(max-width:660px){
  .sidebar{display:none}
  .page-content{padding:16px}
  .hero-banner{padding:20px}
  .hero-title{font-size:20px}
  .admin-sb{width:0;overflow:hidden}
}
</style>
</head>
<body>
<div id="app"></div>
<div id="modal-overlay" class="modal-overlay" onclick="M.handleOverlay(event)">
  <div id="modal-box" class="modal" onclick="event.stopPropagation()">
    <div id="modal-content"></div>
  </div>
</div>
<div id="toast" class="toast"><span id="toast-icon"></span><span id="toast-msg"></span></div>

<!-- Lucide Icons -->
<script src="https://cdn.jsdelivr.net/npm/lucide@0.263.1/dist/umd/lucide.min.js"></script>
<script>
'use strict';
// ============================================================
//  UGT PLATAFORMA EUROPA — v6.0
//  Vanilla JS · Single HTML · Netlify-ready
//  Datos compartidos via JSONBin.io (configurable desde Admin)
// ============================================================

// ── CSS VARIABLES (applied from data) ───────────────────────
function applyTheme(ap){
  const r=document.documentElement.style;

}

// ── LOCAL STORAGE ────────────────────────────────────────────
const LS = {
  D:'ugt_v6_data',
  P:'ugt_v6_pass',
  JB:'ugt_v6_jb',
  load(){
    try{const s=localStorage.getItem(this.D);return s?JSON.parse(s):null;}
    catch{return null;}
  },
  save(d){try{localStorage.setItem(this.D,JSON.stringify(d));}catch(e){}},
  pass(){return localStorage.getItem(this.P)||'ugt2026';},
  setPass(p){localStorage.setItem(this.P,p);},
  jb(){try{const s=localStorage.getItem(this.JB);return s?JSON.parse(s):{apiKey:'',binId:''};}catch{return{apiKey:'',binId:''};}}
};

// ── JSONBIN ──────────────────────────────────────────────────
const JB = {
  endpoint:'https://api.jsonbin.io/v3/b',
  async get(binId,apiKey){
    const r=await fetch(`${this.endpoint}/${binId}/latest`,{
      headers:{'X-Master-Key':apiKey,'X-Bin-Meta':'false'}
    });
    if(!r.ok)throw new Error('JSONBin GET error '+r.status);
    return r.json();
  },
  async put(binId,apiKey,data){
    const r=await fetch(`${this.endpoint}/${binId}`,{
      method:'PUT',
      headers:{'Content-Type':'application/json','X-Master-Key':apiKey},
      body:JSON.stringify(data)
    });
    if(!r.ok)throw new Error('JSONBin PUT error '+r.status);
    return r.json();
  },
  async create(apiKey,data){
    const r=await fetch(this.endpoint,{
      method:'POST',
      headers:{'Content-Type':'application/json','X-Master-Key':apiKey,'X-Bin-Name':'UGT Plataforma Europa'},
      body:JSON.stringify(data)
    });
    if(!r.ok)throw new Error('JSONBin CREATE error '+r.status);
    return r.json();
  }
};

// ── STATE ────────────────────────────────────────────────────
let D = null;       // current data
let APP = {
  page:'inicio',
  admin:false, adminAuth:false, adminPage:'apariencia',
  openDocGroup:null,
  syncing:false, syncError:null, lastSync:null
};

// ── INIT ─────────────────────────────────────────────────────
async function init(){
  // 1. load from localStorage first (instant)
  const cached=LS.load();
  D = cached ? deepMerge(deepClone(DEFAULT_DATA), cached) : deepClone(DEFAULT_DATA);
  applyTheme(D.apariencia);
  render();

  // 2. try to fetch from JSONBin if configured
  const jb=D.jsonbin||{};
  if(jb.apiKey&&jb.binId){
    try{
      const remote=await JB.get(jb.binId,jb.apiKey);
      D=deepMerge(deepClone(DEFAULT_DATA), remote);
      D.jsonbin=jb; // keep creds
      LS.save(D);
      applyTheme(D.apariencia);
      APP.lastSync=new Date().toLocaleTimeString('es-ES');
      render();
    }catch(e){
      console.warn('JSONBin fetch failed:',e.message);
    }
  }
}

// ── SAVE & SYNC ───────────────────────────────────────────────
async function saveAndSync(showToast=true){
  LS.save(D);
  const jb=D.jsonbin||{};
  if(jb.apiKey&&jb.binId){
    APP.syncing=true;
    try{
      await JB.put(jb.binId,jb.apiKey,D);
      APP.lastSync=new Date().toLocaleTimeString('es-ES');
      APP.syncError=null;
      if(showToast)toast('Guardado y sincronizado para todos ✓','ok');
    }catch(e){
      APP.syncError=e.message;
      if(showToast)toast('Guardado localmente (error de sync: '+e.message+')','err');
    }finally{APP.syncing=false;}
  }else{
    if(showToast)toast('Guardado localmente (configura JSONBin para sincronizar)','ok');
  }
}

// ── UTILITIES ────────────────────────────────────────────────
function deepClone(o){return JSON.parse(JSON.stringify(o));}
function deepMerge(base,over){
  if(Array.isArray(over))return over;
  if(typeof over!=='object'||over===null)return over!==undefined?over:base;
  const r={...base};
  for(const k of Object.keys(over)){
    if(over[k]!==undefined){
      if(k in base&&typeof base[k]==='object'&&!Array.isArray(base[k])&&base[k]!==null&&typeof over[k]==='object'&&!Array.isArray(over[k]))
        r[k]=deepMerge(base[k],over[k]);
      else r[k]=over[k];
    }
  }
  return r;
}
function esc(s){
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function newId(){return Date.now()+Math.floor(Math.random()*999);}
function nowDate(){return new Date().toLocaleDateString('es-ES',{day:'numeric',month:'short',year:'numeric'});}
function textToHtml(s){
  return esc(s||'').split('\n').map(l=>l?`<p style="margin-bottom:8px">${l}</p>`:'<div style="height:6px"></div>').join('');
}
function catBadge(cat){
  const c=(D.catColors||{})[cat]||{bg:'#F3F4F6',text:'#4B5563'};
  return `<span class="badge" style="background:${esc(c.bg)};color:${esc(c.text)}">${esc(cat)}</span>`;
}
// lucide icon helper
function ico(name,sz,col){
  sz=sz||18;
  const cs=col?`color:${col};`:'';
  return `<svg data-lucide="${esc(name)}" style="width:${sz}px;height:${sz}px;${cs}flex-shrink:0;display:inline-block;vertical-align:middle"></svg>`;
}
function refreshIcons(){if(window.lucide)lucide.createIcons();}

// ── TOAST ─────────────────────────────────────────────────────
let _toastTimer=null;
function toast(msg,type='ok'){
  const el=document.getElementById('toast');
  const ic=document.getElementById('toast-icon');
  const ms=document.getElementById('toast-msg');
  if(!el)return;
  el.className='toast '+(type==='ok'?'toast-ok':'toast-err');
  ic.innerHTML=type==='ok'?ico('CheckCircle',16,'#fff'):ico('AlertCircle',16,'#fff');
  ms.textContent=msg;
  el.classList.add('show');
  if(_toastTimer)clearTimeout(_toastTimer);
  _toastTimer=setTimeout(()=>el.classList.remove('show'),3800);
  refreshIcons();
}

const M = {

  const f=e.target.files[0];if(!f)return;

  r.onload=ev=>{

    const lp=document.getElementById('logo-prev');if(lp)lp.src=uri;
    const sl=document.querySelectorAll('.sb-logo,.admin-logo,.login-logo,.hero-logo');
    sl.forEach(img=>img.src=uri);
    toast('Logo actualizado — guarda para conservarlo','ok');
  };
  r.readAsDataURL(f);
}

      </button>
      <button class="btn btn-secondary" onclick="_editNewsId=null;renderAdmin()">${ico('X',14)} Cancelar</button>

function updateImgPrev(){
  const url=v('nf-img');const w=document.getElementById('img-prev-wrap');const i=document.getElementById('img-prev');
  if(!w||!i)return;
  if(url){w.style.display='';i.src=url;}else{w.style.display='none';}
}

function saveNews(id,isNew){
  const titulo=v('nf-titulo'),texto=v('nf-texto'),resumen=v('nf-resumen');
  if(!titulo){toast('El título es obligatorio','err');return;}
  if(!resumen){toast('El resumen es obligatorio','err');return;}
  if(!texto){toast('El texto completo es obligatorio','err');return;}
  const n={id:isNew?newId():id,urgente:cb('nf-urgente'),img:v('nf-img'),
    titulo,fecha:v('nf-fecha')||nowDate(),categoria:v('nf-cat')||'Convenio',resumen,texto};
  if(isNew) D.noticias.unshift(n);
  else D.noticias=D.noticias.map(x=>x.id===id?n:x);
  _editNewsId=null;
  saveAndSync();
  renderAdmin();
}

function editNews(id){_editNewsId=id;renderAdmin();}
function deleteNews(id){
  if(!confirm('¿Eliminar esta noticia permanentemente?'))return;
  D.noticias=D.noticias.filter(n=>n.id!==id);
  saveAndSync();renderAdmin();
}
function moveNews(id,dir){
  const i=D.noticias.findIndex(n=>n.id===id);if(i<0)return;
  const j=i+dir;if(j<0||j>=D.noticias.length)return;
  [D.noticias[i],D.noticias[j]]=[D.noticias[j],D.noticias[i]];
  saveAndSync(false);renderAdmin();
}

function deleteGroup(gid){
  if(!confirm('¿Eliminar este grupo y todos sus documentos?'))return;

}
function deleteDoc(gid,did){
  if(!confirm('¿Eliminar este documento?'))return;
  D.docGroups=D.docGroups.map(g=>g.id!==gid?g:{...g,docs:g.docs.filter(d=>d.id!==did)});
  saveAndSync();renderAdmin();
}
function saveGroup(gid,isNew){
  const nombre=v('gf-nombre');if(!nombre){toast('El nombre es obligatorio','err');return;}
  const g={id:gid,nombre,icono:v('gf-icono')||'FolderOpen',color:v('gf-color')||v('gf-colort')||'#374151',
    docs:isNew?[]:((D.docGroups.find(x=>x.id===gid)||{}).docs||[])};
  if(isNew) D.docGroups.push(g);
  else D.docGroups=D.docGroups.map(x=>x.id===gid?g:x);
  _editDocGroupId=null;_editDocId=null;
  saveAndSync();renderAdmin();
}
function saveDoc(gid,did,isNew){
  const nombre=v('df-nombre'),url=v('df-url');
  if(!nombre){toast('El nombre es obligatorio','err');return;}
  if(!url){toast('La URL es obligatoria','err');return;}
  const doc={id:isNew?newId():did,nombre,tipo:v('df-tipo')||'pdf',fecha:v('df-fecha'),importante:cb('df-imp'),url};
  D.docGroups=D.docGroups.map(g=>{
    if(g.id!==gid)return g;
    const docs=isNew?[...g.docs,doc]:g.docs.map(d=>d.id===did?doc:d);
    return {...g,docs};
  });
  _editDocId=null;
  saveAndSync();renderAdmin();
}

async function saveJSONBin(){
  const key=v('jb-key'),bin=v('jb-bin');
  if(!key||!bin){toast('Ambos campos son obligatorios','err');return;}
  toast('Probando conexión...','ok');
  try{
    await JB.put(bin,key,D);
    D.jsonbin={apiKey:key,binId:bin};
    LS.save(D);
    APP.lastSync=new Date().toLocaleTimeString('es-ES');
    toast('¡Conexión exitosa! Datos sincronizados para todos.','ok');
    renderAdmin();
  }catch(e){
    toast('Error de conexión: '+e.message,'err');
  }
}
async function clearJSONBin(){
  if(!confirm('¿Desconectar JSONBin? Los cambios solo se guardarán localmente.'))return;
  D.jsonbin={apiKey:'',binId:''};LS.save(D);renderAdmin();
}
async function forcSync(){
  const jb=D.jsonbin||{};
  if(!jb.apiKey||!jb.binId){toast('JSONBin no está configurado','err');return;}
  await saveAndSync(true);
}

function changePass(){
  const p1=v('aj-p1'),p2=v('aj-p2');
  if(!p1){toast('La contraseña no puede estar vacía','err');return;}
  if(p1!==p2){toast('Las contraseñas no coinciden','err');return;}
  LS.setPass(p1);toast('Contraseña cambiada correctamente ✓','ok');
  document.getElementById('aj-p1').value='';document.getElementById('aj-p2').value='';
}
function resetData(){
  if(!confirm('⚠️ ¿Restaurar TODOS los datos al estado inicial? Esta acción no se puede deshacer.'))return;
  localStorage.removeItem('ugt_v6_data');
  D=deepClone(DEFAULT_DATA);
  applyTheme(D.apariencia);
  toast('Datos restaurados al estado inicial','ok');
  render();
}
